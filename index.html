<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;flex-shrink:0}
#header h2{color:#00d4aa;font-size:16px}
#header .sub{color:#888;font-size:11px}
#header .badge{background:#2a2a4a;padding:2px 10px;border-radius:10px;font-size:10px;color:#aaa}
#main{display:flex;flex:1;height:calc(100vh - 42px)}
#graph-wrap{flex:1;position:relative;background:#0f0f1a;overflow:hidden}
#graph-canvas{position:absolute;inset:0}
#graph-overlay{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px}
#graph-overlay button{background:#1a1a2e;border:1px solid #2a2a4a;color:#ccc;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px}
#graph-overlay button:hover{background:#2a2a4a}
#graph-legend{position:absolute;bottom:12px;left:12px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:6px;padding:8px 12px;z-index:10;font-size:10px;opacity:.9}
#graph-legend .row{display:flex;align-items:center;gap:5px;margin:2px 0}
#graph-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#graph-legend .dot.exchange{background:#f87171}
#graph-legend .dot.tool{background:#d1d5db}
#graph-legend .dot.competitor{background:#c084fc}
#sidebar{width:400px;background:#1a1a2e;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sidebar .tabs{display:flex;border-bottom:1px solid #2a2a4a;flex-shrink:0}
#sidebar .tabs button{flex:1;padding:8px;background:none;border:none;color:#666;cursor:pointer;font-size:11px;border-bottom:2px solid transparent;transition:all .2s}
#sidebar .tabs button.active{color:#00d4aa;border-bottom-color:#00d4aa}
#sidebar .tab-content{flex:1;overflow-y:auto;padding:12px;display:none;font-size:12px}
#sidebar .tab-content.active{display:block}
#sidebar .tab-content h3{color:#00d4aa;font-size:14px;margin-bottom:8px}
#sidebar .tab-content h4{color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px}
.df{margin-bottom:6px}
.df .lbl{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.df .val{color:#e0e0e0;font-size:13px;margin-top:1px}
.rc{background:#15152a;border:1px solid #252545;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.rc .target{color:#c084fc;font-size:13px;font-weight:600}
.rc .desc{color:#ccc;font-size:12px;margin:3px 0}
.rc .srclbl{color:#888;font-size:10px;margin-top:4px;display:block}
.empty-state{color:#555;font-size:12px;text-align:center;padding:30px 16px}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#555;font-size:14px;z-index:5}
@media(max-width:768px){#main{flex-direction:column}#sidebar{width:100%;height:40vh;border-left:none;border-top:1px solid #2a2a4a}}
</style>
</head>

  {f:'CryptoFateev',t:'Binance',l:'partner',d:'CryptoFateev → partner → Binance'},
  {f:'CryptoInside',t:'Binance',l:'partner',d:'CryptoInside → partner → Binance'},
  {f:'Binance',t:'Coinbase',l:'mentioned_in',d:'Binance → mentioned_in → Coinbase'},
  {f:'Bitcoin',t:'Binance',l:'mentioned_in',d:'Bitcoin → mentioned_in → Binance'},
  {f:'Ethereum',t:'Binance',l:'mentioned_in',d:'Ethereum → mentioned_in → Binance'},
  {f:'Base',t:'Binance',l:'mentioned_in',d:'Base → mentioned_in → Binance'},
  {f:'Ton',t:'Binance',l:'mentioned_in',d:'Ton → mentioned_in → Binance'},
  {f:'Sui',t:'Binance',l:'mentioned_in',d:'Sui → mentioned_in → Binance'},
  {f:'Solana',t:'Binance',l:'mentioned_in',d:'Solana → mentioned_in → Binance'},
  {f:'Cz',t:'Binance',l:'mentioned_in',d:'Cz → mentioned_in → Binance'},
  {f:'Bitcoin',t:'Bybit',l:'mentioned_in',d:'Bitcoin → mentioned_in → Bybit'},
  {f:'Ethereum',t:'Bybit',l:'mentioned_in',d:'Ethereum → mentioned_in → Bybit'},
  {f:'Ton',t:'Bybit',l:'mentioned_in',d:'Ton → mentioned_in → Bybit'},

];
        hover:{background:'#ffff88',border:ec}},
      font:{color:'#fff',strokeWidth:3,strokeColor:'#000',size:Math.min(sz*0.38,13),multi:true,bold:true},
      borderWidth:2,borderWidthSelected:4,size:sz,
      shape:n.g==='exchange'?'box':'dot',mass:m};
  }));

  var edges=new vis.DataSet(EE.map(function(e,i){
    return{id:i,from:e.f,to:e.t,label:e.l,title:e.d,
      color:{color:edgeColor[e.l]||'#555',highlight:'#fff',hover:'#fff'},
      width:1.8,font:{size:9,color:edgeColor[e.l]||'#888',strokeWidth:2,strokeColor:'#0f0f1a',align:'middle'},
      smooth:{type:'curvedCW',roundness:0.15},
      arrows:{to:{enabled:true,scaleFactor:0.6}}};
  }));
  net=new vis.Network(document.getElementById('graph-canvas'),{nodes:nodes,edges:edges},{
    physics:{solver:'barnesHut',
      barnesHut:{gravitationalConstant:-4000,centralGravity:0.35,springLength:320,springConstant:0.025,damping:0.5},
      stabilization:{iterations:600}},
    layout:{improvedLayout:true},
    interaction:{hover:true,tooltipDelay:200,keyboard:true,zoomView:true,dragView:true},
    edges:{smooth:{type:'curvedCW'}},
  });
  var ld=document.getElementById('loading');
  if(ld)ld.style.display='none';
  net.once('stabilizationIterationsDone',function(){
    net.fit({animation:true,duration:300});
    // Highlight Headliners node initially
    net.selectNodes(['headliners']);
    showNode('headliners');
  });
  net.on('click',function(p){
    if(p.nodes.length>0)showNode(p.nodes[0]);
    else net.unselectAll();
  });
  net.on('hoverNode',function(p){document.body.style.cursor='pointer';});
  net.on('blurNode',function(p){document.body.style.cursor='default';});
}

function zoomIn(){if(net)net.moveScale(1.3);}
function zoomOut(){if(net)net.moveScale(0.7);}
function zoomFit(){if(net)net.fit();}
function resetView(){if(net){net.fit();net.moveTo({scale:1});}}

function showNode(id){
  var n=NN.find(function(x){return x.id===id;});
  if(!n)return;
  var lbl=n.l.replace('\n',' '),g=n.g,de=n.d;
  var h='<h3>'+lbl+'</h3>';
  h+='<div class="df"><div class="lbl">Type</div><div class="val">'+
    ({exchange:'Биржа',tool:'Инструмент',competitor:'Конкурент/Участник'}[g]||g)+'</div></div>';
  h+='<div class="df"><div class="lbl">Description</div><div class="val">'+de+'</div></div>';
  document.getElementById('tab-entity').innerHTML=h;

  var rels=relMap[id]||[];
  var rh='<h3>Связи: '+lbl+'</h3>';
  if(rels.length===0)rh+='<div class="empty-state">Нет связей</div>';
  else rels.forEach(function(r){
    var tgt=r.d==='out'?nmap[r.to]:nmap[r.from];
    var sym=r.d==='out'?'→':'←';
    var lblType={'partner':'Партнёр','competitor':'Конкурент','founder':'Основатель'}[r.l]||r.l;
    rh+='<div class="rc"><div class="target">'+sym+' '+tgt+'</div>';
    rh+='<div class="desc"><b>'+lblType+'</b>: '+r.ds+'</div></div>';
  });
  document.getElementById('tab-relations').innerHTML=rh;
  switchTab('entity');
}

function switchTab(t){
  var tabs=['entity','relations'];
  document.querySelectorAll('.tabs button').forEach(function(b,i){
    b.classList.toggle('active',tabs[i]===t);
  });
  tabs.forEach(function(tab){
    var el=document.getElementById('tab-'+tab);
    if(el)el.classList.toggle('active',tab===t);
  });
}

setTimeout(initGraph,300);
