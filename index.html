<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хедлайнеры — карта связей</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f23;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #2a2a4e;
  background: #1a1a2e;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 1.5em; color: #00d4aa; }
.header .subtitle { color: #888; font-size: 0.85em; margin-top: 4px; }
.header .links { margin-top: 8px; }
.header .links a {
  color: #c084fc;
  font-size: 0.8em;
  text-decoration: none;
  padding: 4px 12px;
  border: 1px solid #2a2a4e;
  border-radius: 6px;
  margin: 0 4px;
  transition: background 0.2s;
}
.header .links a:hover { background: #2a2a4e; }
#loader {
  text-align: center;
  padding: 60px 20px;
  color: #888;
}
#loader .spinner {
  width: 40px; height: 40px;
  border: 3px solid #2a2a4e;
  border-top-color: #00d4aa;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
#error {
  display: none;
  text-align: center;
  padding: 40px 20px;
  color: #ff6b6b;
}
.graph-container {
  width: 100%;
  overflow: auto;
  padding: 20px;
  min-height: 80vh;
}
.graph-container svg { max-width: none; margin: 0 auto; display: block; }
.legend {
  max-width: 800px;
  margin: 20px auto;
  padding: 16px;
  background: #1a1a2e;
  border: 1px solid #2a2a4e;
  border-radius: 12px;
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85em;
  color: #ccc;
}
.legend-dot {
  width: 14px; height: 14px;
  border-radius: 3px;
}
.footer {
  text-align: center;
  padding: 16px;
  color: #555;
  font-size: 0.8em;
  border-top: 1px solid #2a2a4e;
}
@media (max-width: 768px) {
  .header h1 { font-size: 1.2em; }
  .graph-container { padding: 10px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>🏛 Хедлайнеры — карта взаимосвязей</h1>
  <div class="subtitle">Конкуренты, партнёры и инструменты крипто-сообщества</div>
  <div class="links">
    <a href="mermaid.txt" target="_blank">📄 Исходный код</a>
    <a href="#" id="editLink" target="_blank">✏️ Редактировать</a>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Биржи</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d1d5db"></div> Инструменты</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div> Конкуренты</div>
  <div class="legend-item">➡️ <span style="color:#ffd93d">partner</span></div>
  <div class="legend-item">➡️ <span style="color:#ff9f43">competitor</span></div>
  <div class="legend-item">➡️ <span style="color:#00d4aa">founder</span></div>
</div>

<div id="loader">
  <div class="spinner"></div>
  <p>Загрузка графа...</p>
</div>

<div id="error">
  <p>❌ Не удалось загрузить граф</p>
</div>

<div class="graph-container" id="graphContainer" style="display:none">
  <pre class="mermaid" id="mermaidContainer"></pre>
</div>

<div class="footer">
  Headliners — карта взаимосвязей крипто-сообщества • 2026
</div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  maxEdges: 500,
  maxNodeLabels: 200,
  flowchart: {
    useMaxWidth: true,
    htmlLabels: true,
    curve: 'basis',
    padding: 20
  },
  themeVariables: {
    darkMode: true,
    background: '#0f0f23',
    primaryColor: '#1a1a2e',
    primaryTextColor: '#e0e0e0',
    primaryBorderColor: '#2a2a4e',
    lineColor: '#6b7280',
    secondaryColor: '#2a2a4e',
    tertiaryColor: '#1a1a2e',
    clusterBkg: '#15152a',
    clusterBorder: '#2a2a4e',
    nodeBorder: '#2a2a4e',
    mainBkg: '#1a1a2e'
  }
});

function encodeForMermaidLive(code) {
  const mapping = {};
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-';
  let result = '';
  let padding = '';
  
  // pako-style deflate + base64url encode for Mermaid Live
  // We'll just use a simpler approach: btoa + encodeURIComponent
  return btoa(unescape(encodeURIComponent(code)));
}

fetch('mermaid.txt?_=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(code => {
    document.getElementById('loader').style.display = 'none';
    
    // Set edit link
    document.getElementById('editLink').href = 'https://mermaid.live/edit#pako:' + btoa(unescape(encodeURIComponent('graph TD\n' + code)));
    
    // Render
    const container = document.getElementById('mermaidContainer');
    container.textContent = code;
    document.getElementById('graphContainer').style.display = '';
    
    return mermaid.run({ nodes: [container] });
  })
  .catch(err => {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error').style.display = '';
    document.getElementById('error').innerHTML = '<p>❌ ' + err.message + '</p>';
  });
</script>
</body>
</html>
