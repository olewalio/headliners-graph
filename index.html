<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Хедлайнеры — граф связей</title>
<script src="https://unpkg.com/vis-data@7.1.4/standalone/umd/vis-data.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;overflow:hidden}
#header{display:flex;align-items:center;padding:6px 14px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;gap:10px}
#header h2{color:#00d4aa;font-size:14px;white-space:nowrap}
#header .sub{color:#888;font-size:10px}
#header .badge{background:#2a2a4a;padding:2px 10px;border-radius:10px;font-size:10px;color:#aaa;margin-left:auto}
#main{display:flex;height:calc(100vh - 36px)}
#graph-wrap{flex:1;position:relative;background:#0f0f1a;overflow:hidden}
#graph-canvas{position:absolute;inset:0}
#graph-overlay{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px}
#graph-overlay button{background:#1a1a2e;border:1px solid #2a2a4a;color:#ccc;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px}
#graph-overlay button:hover{background:#2a2a4a}
#legend{position:absolute;bottom:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:3px;font-size:10px;background:#1a1a2ee0;border:1px solid #2a2a4a;border-radius:6px;padding:8px 10px}
#legend .row{display:flex;align-items:center;gap:6px;color:#ccc;font-size:10px}
#legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
#legend .line{width:20px;height:2px;display:inline-block;border-radius:1px}
#legend .title{color:#aaa;font-weight:bold;font-size:10px;margin-bottom:2px}
#legend .divider{height:1px;background:#2a2a4a;margin:4px 0}
#sidebar{width:380px;background:#1a1a2e;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:hidden}
#sidebar .tabs{display:flex;border-bottom:1px solid #2a2a4a}
#sidebar .tabs button{flex:1;padding:7px;background:none;border:none;color:#666;cursor:pointer;font-size:10px;border-bottom:2px solid transparent}
#sidebar .tabs button.active{color:#00d4aa;border-bottom-color:#00d4aa}
#sidebar .tab-content{flex:1;overflow-y:auto;padding:10px;display:none;font-size:11px}
#sidebar .tab-content.active{display:block}
#sidebar .tab-content h3{color:#00d4aa;font-size:13px;margin-bottom:6px}
.df{margin-bottom:5px}
.df .lbl{color:#666;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.df .val{color:#e0e0e0;font-size:12px;margin-top:1px}
.rc{background:#15152a;border:1px solid #252545;border-radius:5px;padding:6px 8px;margin-bottom:5px}
.rc .target{color:#c084fc;font-size:12px;font-weight:600}
.rc .desc{color:#ccc;font-size:11px;margin:2px 0}
.empty-state{color:#555;font-size:11px;text-align:center;padding:20px}
@media(max-width:768px){#main{flex-direction:column}#sidebar{width:100%;height:35vh}}
</style></head><body>
<div id="header">
  <h2>🏛 Хедлайнеры — Граф связей</h2>
  <div class="sub"></div>
  <div class="badge">Кликни на узле → детали</div>
</div>
<div id="main">
<div id="graph-wrap">
<div id="graph-canvas"></div>
<div id="graph-overlay">
<button onclick="zoomIn()">➕</button>
<button onclick="zoomOut()">➖</button>
<button onclick="zoomFit()">Fit</button>
</div>
<div id="legend">
  <div class="title">🔺 Пирамида</div>
  <div class="row"><span class="dot" style="background:#f87171"></span> Биржи (центр)</div>
  <div class="row"><span class="dot" style="background:#d1d5db"></span> Инструменты</div>
  <div class="row"><span class="dot" style="background:#c084fc"></span> Каналы</div>
  <div class="divider"></div>
  <div class="title">🔗 Связи</div>
  <div class="row"><span class="line" style="background:#ffd93d"></span> Партнёр</div>
  <div class="row"><span class="line" style="background:#00d4aa"></span> Основатель</div>
  <div class="row"><span class="line" style="background:#667799"></span> Субдомен/Ресурс</div>
</div>
</div>
<div id="sidebar">
  <div class="tabs"><button class="active" onclick="switchTab('entity')">Сущность</button><button onclick="switchTab('relations')">Связи</button></div>
  <div class="tab-content active" id="tab-entity"><div class="empty-state">Кликни на узел</div></div>
  <div class="tab-content" id="tab-relations"><div class="empty-state">Кликни на узел</div></div>
</div></div>
<script>
// === DATA ===
var NN=[{id:'Binance',l:'Binance',g:'exchange',sz:32,m:15},{id:'BingX',l:'BingX',g:'exchange',sz:32,m:15},{id:'Bitget',l:'Bitget',g:'exchange',sz:32,m:15},{id:'Bybit',l:'Bybit',g:'exchange',sz:32,m:15},{id:'WhiteBIT',l:'WhiteBIT',g:'exchange',sz:32,m:15},{id:'OKX',l:'OKX',g:'exchange',sz:32,m:15},{id:'UTEX',l:'UTEX',g:'exchange',sz:32,m:15},{id:'HashHedge',l:'HashHedge',g:'tool',sz:22,m:4},{id:'Headliners',l:'Headliners',g:'organization',sz:36,m:5},{id:'CoinW',l:'CoinW',g:'media',sz:28,m:2.5},{id:'Kirill_Evans',l:'Kirill Evans',g:'media',sz:34,m:2.5},{id:'Roman_Tomera',l:'Roman Tomera',g:'media',sz:34,m:2.5},{id:'PRO_BLOCKCHAIN',l:'PRO BLOCKCHAIN',g:'media',sz:34,m:2.5},{id:'ForkLog',l:'ForkLog',g:'media',sz:34,m:2.5},{id:'DOUBLETOP',l:'DOUBLETOP',g:'media',sz:34,m:2.5},{id:'SLEZY_SATOSHI',l:'SLEZY SATOSHI',g:'media',sz:26,m:1.8},{id:'RDeni',l:'RDeni',g:'media',sz:26,m:1.8},{id:'CryptoFateev',l:'CryptoFateev',g:'media',sz:26,m:1.8},{id:'CryptoInside',l:'CryptoInside',g:'media',sz:26,m:1.8},{id:'Crypto_Falcon',l:'Crypto Falcon',g:'media',sz:26,m:1.8},{id:'Cryptology_Education',l:'Cryptology Education',g:'media',sz:26,m:1.8},{id:'Prometheus_Bitcoin',l:'Prometheus Bitcoin',g:'media',sz:26,m:1.8},{id:'Дневник_активов',l:'Дневник активов',g:'media',sz:26,m:1.8},{id:'Nikita_Anufriev',l:'Никита Ануфриев',g:'person',sz:28,m:2.5},{id:'CoinW_Telegram',l:'CoinW Telegram',g:'other',sz:14,m:0.7},{id:'Evans_Crypto_TG',l:'Evans Crypto TG',g:'other',sz:14,m:0.7},{id:'CrypTomera_TG',l:'CrypTomera TG',g:'other',sz:14,m:0.7},{id:'crypto_rostik_TG',l:'crypto_rostik TG',g:'other',sz:14,m:0.7},{id:'SleziSatoshi_TG',l:'SleziSatoshi TG',g:'other',sz:14,m:0.7},{id:'Pro_Block_Bot',l:'Pro_Block_Bot',g:'other',sz:14,m:0.7},{id:'XXXHunters_bot',l:'XXXHunters_bot',g:'other',sz:14,m:0.7},{id:'nainspire_TG',l:'nainspire TG',g:'other',sz:14,m:0.7},{id:'headIinersadmin',l:'headIinersadmin',g:'other',sz:14,m:0.7},{id:'headlinerslinks_com',l:'headlinerslinks.com',g:'other',sz:14,m:0.7},{id:'headliners_traders_bot',l:'headliners_traders_bot',g:'other',sz:14,m:0.7},{id:'Headliners_YouTube_Main',l:'Headliners YouTube Main',g:'other',sz:16,m:1},{id:'Headliners_TradeLab',l:'Headliners TradeLab',g:'other',sz:16,m:1},{id:'Headliners_Crypto_TG',l:'Headliners Crypto TG',g:'other',sz:16,m:1},{id:'HashHedge_TG',l:'HashHedge',g:'tool',sz:22,m:4},{id:'MicronCryptoBot',l:'MicronCryptoBot',g:'other',sz:14,m:0.7},{id:'kirillevans_com',l:'kirillevans.com',g:'other',sz:14,m:0.7},{id:'cryptocommunity_ai',l:'cryptocommunity.ai',g:'other',sz:14,m:0.7},{id:'dust_link',l:'dust.link',g:'other',sz:14,m:0.7},{id:'Wyckoff_Company',l:'Wyckoff Company',g:'media',sz:26,m:1.8}];
var EE=[{f:'Binance',t:'CoinW',l:'partner'},{f:'Binance',t:'CryptoFateev',l:'partner'},{f:'Binance',t:'CryptoInside',l:'partner'},{f:'Binance',t:'DOUBLETOP',l:'partner'},{f:'Binance',t:'Kirill_Evans',l:'partner'},{f:'Binance',t:'Prometheus_Bitcoin',l:'partner'},{f:'Binance',t:'Roman_Tomera',l:'partner'},{f:'Binance',t:'Дневник_активов',l:'partner'},{f:'BingX',t:'PRO_BLOCKCHAIN',l:'partner'},{f:'Bitget',t:'SLEZY_SATOSHI',l:'partner'},{f:'Bybit',t:'Crypto_Falcon',l:'partner'},{f:'Bybit',t:'PRO_BLOCKCHAIN',l:'partner'},{f:'Bybit',t:'Roman_Tomera',l:'partner'},{f:'Bybit',t:'Дневник_активов',l:'partner'},{f:'CoinW',t:'CoinW_Telegram',l:'account'},{f:'Headliners',t:'CoinW',l:'partner'},{f:'Headliners',t:'UTEX',l:'partner'},{f:'Headliners',t:'HashHedge',l:'partner'},{f:'Headliners',t:'headlinerslinks_com',l:'subdomain'},{f:'Headliners',t:'headliners_traders_bot',l:'subdomain'},{f:'Headliners_Crypto_TG',t:'Headliners',l:'subdomain'},{f:'Headliners_Crypto_TG',t:'headliners_traders_bot',l:'subdomain'},{f:'Headliners_Crypto_TG',t:'HashHedge',l:'partner'},{f:'Headliners_Crypto_TG',t:'headIinersadmin',l:'employee'},{f:'Headliners_Crypto_TG',t:'nainspire_TG',l:'mention'},{f:'Headliners_TradeLab',t:'Headliners',l:'subdomain'},{f:'Headliners_TradeLab',t:'Headliners_YouTube_Main',l:'mention'},{f:'Headliners_YouTube_Main',t:'Headliners',l:'subdomain'},{f:'Headliners_YouTube_Main',t:'Nikita_Anufriev',l:'founder'},{f:'Kirill_Evans',t:'Binance',l:'partner'},{f:'Kirill_Evans',t:'Evans_Crypto_TG',l:'subdomain'},{f:'Kirill_Evans',t:'MicronCryptoBot',l:'subdomain'},{f:'Kirill_Evans',t:'cryptocommunity_ai',l:'subdomain'},{f:'Kirill_Evans',t:'dust_link',l:'subdomain'},{f:'Kirill_Evans',t:'kirillevans_com',l:'subdomain'},{f:'Nikita_Anufriev',t:'Headliners',l:'founder'},{f:'Nikita_Anufriev',t:'HashHedge',l:'partner'},{f:'OKX',t:'Roman_Tomera',l:'partner'},{f:'OKX',t:'Cryptology_Education',l:'partner'},{f:'PRO_BLOCKCHAIN',t:'Bybit',l:'partner'},{f:'PRO_BLOCKCHAIN',t:'BingX',l:'partner'},{f:'PRO_BLOCKCHAIN',t:'Pro_Block_Bot',l:'subdomain'},{f:'PRO_BLOCKCHAIN',t:'XXXHunters_bot',l:'subdomain'},{f:'Roman_Tomera',t:'Binance',l:'partner'},{f:'Roman_Tomera',t:'Bybit',l:'partner'},{f:'Roman_Tomera',t:'OKX',l:'partner'},{f:'Roman_Tomera',t:'CrypTomera_TG',l:'subdomain'},{f:'RDeni',t:'WhiteBIT',l:'partner'},{f:'RDeni',t:'crypto_rostik_TG',l:'subdomain'},{f:'SLEZY_SATOSHI',t:'Bitget',l:'partner'},{f:'SLEZY_SATOSHI',t:'SleziSatoshi_TG',l:'subdomain'},{f:'WhiteBIT',t:'RDeni',l:'partner'},{f:'Wyckoff_Company',t:'Headliners',l:'partner'},{f:'Дневник_активов',t:'Binance',l:'partner'},{f:'Дневник_активов',t:'Bybit',l:'partner'}];

// === GRAPH ===
var C={exchange:'#f87171',tool:'#ffd93d',media:'#c084fc',other:'#667799',person:'#c084fc',organization:'#f87171'};
var edgeColor={partner:'#ffd93d',founder:'#00d4aa',subdomain:'#667799',mention:'#667799',account:'#667799',employee:'#667799'};
var LEVEL={exchange:0,organization:0,media:1,person:1,other:3,tool:4};
var LAYER_NAMES=['Биржи','Каналы','Смыслы','Инфраструктура','Инструменты'];
var net;

function initGraph(){
  var nodes=new vis.DataSet(NN.map(function(n){
    var lvl=LEVEL[n.g]||2;
    return{id:n.id,label:n.l,group:n.g,level:lvl,
      color:{background:C[n.g]||'#888',border:'#fff',highlight:{background:'#ffff88',border:C[n.g]||'#888'},hover:{background:'#ffff88',border:C[n.g]||'#888'}},
      font:{color:'#fff',strokeWidth:2,strokeColor:'#000',size:Math.min(n.sz*0.37,12),multi:true,bold:true},
      borderWidth:2,borderWidthSelected:4,size:n.sz,shape:n.g==='exchange'?'box':'dot',mass:n.m||1};
  }));
  var edges=new vis.DataSet(EE.map(function(e,i){
    return{id:i,from:e.f,to:e.t,label:e.l,
      color:{color:edgeColor[e.l]||'#555',highlight:'#fff',hover:'#fff'},
      width:1.5,font:{size:8,color:edgeColor[e.l]||'#888',strokeWidth:2,strokeColor:'#0f0f1a',align:'middle'},
      smooth:{type:'curvedCW',roundness:0.1},
      arrows:{to:{enabled:true,scaleFactor:0.5}}};
  }));
  net=new vis.Network(document.getElementById('graph-canvas'),{nodes:nodes,edges:edges},{
    layout:{hierarchical:{enabled:true,direction:'UD',sortMethod:'directed',levelSeparation:180,nodeSpacing:120,treeSpacing:100}},
    physics:{enabled:false},interaction:{hover:true,tooltipDelay:200,keyboard:true,zoomView:true,dragView:true},
    edges:{smooth:{type:'curvedCW'}},
  });
  document.querySelector('.sub').textContent='7 бирж · '+NN.length+' сущностей · '+EE.length+' связей';
  net.once('stabilizationIterationsDone',function(){net.fit({animation:true,duration:300});});
  net.on('click',function(p){if(p.nodes.length>0)showNode(p.nodes[0]);else net.unselectAll();});
  net.on('hoverNode',function(){document.body.style.cursor='pointer';});
  net.on('blurNode',function(){document.body.style.cursor='default';});
}
function zoomIn(){if(net)net.moveScale(1.3);}
function zoomOut(){if(net)net.moveScale(0.7);}
function zoomFit(){if(net)net.fit({animation:true});}
function showNode(id){
  var n=NN.find(function(x){return x.id===id;});if(!n)return;
  var lvl=LEVEL[n.g]!==undefined?LEVEL[n.g]:2;
  var lbl=n.l.replace(/\n/g,' ');
  var h='<h3>'+lbl+'</h3><div class="df"><div class="lbl">Пирамида</div><div class="val">'+LAYER_NAMES[lvl]+'</div></div>';
  document.getElementById('tab-entity').innerHTML=h;
  var rh='<h3>Связи: '+lbl+'</h3>';
  var rels=[];
  EE.forEach(function(e){if(e.f===id||e.t===id)rels.push(e);});
  if(rels.length===0)rh+='<div class="empty-state">Нет связей</div>';
  else rels.forEach(function(r){
    var tgt=r.f===id?r.t:r.f;var dir=r.f===id?'→':'←';
    var nm=NN.find(function(x){return x.id===tgt;});
    rh+='<div class="rc"><div class="target">'+dir+' '+(nm?nm.l.replace(/\n/g,' '):tgt)+'</div>';
    rh+='<div class="desc">'+({partner:'Партнёр',founder:'Основатель',subdomain:'Субдомен',mention:'Упоминание',account:'Аккаунт',employee:'Сотрудник'}[r.l]||r.l)+'</div></div>';
  });
  document.getElementById('tab-relations').innerHTML=rh;
  switchTab('entity');
}
function switchTab(t){['entity','relations'].forEach(function(tab){var el=document.getElementById('tab-'+tab);if(el)el.classList.toggle('active',tab===t);});document.querySelectorAll('.tabs button').forEach(function(b,i){b.classList.toggle('active',(i===0&&t==='entity')||(i===1&&t==='relations'));});}
initGraph();
</script></body></html>
