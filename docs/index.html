*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;overflow:hidden}
#header{display:flex;align-items:center;padding:6px 14px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;gap:10px}
#header h2{color:#00d4aa;font-size:14px;white-space:nowrap}
#header .sub{color:#888;font-size:10px}
#header .badge{background:#2a2a4a;padding:2px 10px;border-radius:10px;font-size:10px;color:#aaa;margin-left:auto}
#main{display:flex;height:calc(100vh - 36px)}
#graph-wrap{flex:1;position:relative;background:#0f0f1a;overflow:hidden}
#graph-canvas{position:absolute;inset:0}
#graph-overlay{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px}
#graph-overlay button{background:#1a1a2e;border:1px solid #2a2a4a;color:#ccc;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px}
#graph-overlay button:hover{background:#2a2a4a}
#legend{position:absolute;bottom:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:3px;font-size:10px;background:#1a1a2ee0;border:1px solid #2a2a4a;border-radius:6px;padding:8px 10px}
#legend .row{display:flex;align-items:center;gap:6px;color:#ccc;font-size:10px}
#legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
#legend .line{width:20px;height:2px;display:inline-block;border-radius:1px}
#legend .title{color:#aaa;font-weight:bold;font-size:10px;margin-bottom:2px}
#legend .divider{height:1px;background:#2a2a4a;margin:4px 0}
#sidebar{width:380px;background:#1a1a2e;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:hidden}
#sidebar .tabs{display:flex;border-bottom:1px solid #2a2a4a}
#sidebar .tabs button{flex:1;padding:7px;background:none;border:none;color:#666;cursor:pointer;font-size:10px;border-bottom:2px solid transparent}
#sidebar .tabs button.active{color:#00d4aa;border-bottom-color:#00d4aa}
#sidebar .tab-content{flex:1;overflow-y:auto;padding:10px;display:none;font-size:11px}
#sidebar .tab-content.active{display:block}
#sidebar .tab-content h3{color:#00d4aa;font-size:13px;margin-bottom:6px}
.df{margin-bottom:5px}
.df .lbl{color:#666;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.df .val{color:#e0e0e0;font-size:12px;margin-top:1px}
.rc{background:#15152a;border:1px solid #252545;border-radius:5px;padding:6px 8px;margin-bottom:5px}
.rc .target{color:#c084fc;font-size:12px;font-weight:600}
.rc .desc{color:#ccc;font-size:11px;margin:2px 0}
.empty-state{color:#555;font-size:11px;text-align:center;padding:20px}
@media(max-width:768px){#main{flex-direction:column}#sidebar{width:100%;height:35vh}}
</style>

function showNode(id){
  var n=NN.find(function(x){return x.id===id;});
  if(!n)return;
  var lvl=LEVEL[n.g]!==undefined?LEVEL[n.g]:2;
  var layer=LAYER_NAMES[lvl]||'Другое';
  var lbl=n.l.replace(/\n/g,' ');
  
  var h='<h3>'+lbl+'</h3>';
  h+='<div class="df"><div class="lbl">Пирамида</div><div class="val">'+layer+'</div></div>';
  h+='<div class="df"><div class="lbl">Тип</div><div class="val">'+n.g+'</div></div>';
  document.getElementById('tab-entity').innerHTML=h;
  
  // Relations
  var rh='<h3>Связи: '+lbl+'</h3>';
  var rels=[];
  EE.forEach(function(e){
    if(e.f===id)rels.push({dir:'→',name:EE.name||e.l,tgt:e.t,desc:e.d});
    if(e.t===id)rels.push({dir:'←',name:EE.name||e.l,tgt:e.f,desc:e.d});
  });
  if(rels.length===0)rh+='<div class="empty-state">Нет связей</div>';
  else rels.forEach(function(r){
    var nm=NN.find(function(x){return x.id===r.tgt;});
    var lbl2=nm?nm.l.replace(/\n/g,' '):r.tgt;
    rh+='<div class="rc"><div class="target">'+r.dir+' '+lbl2+'</div>';
    rh+='<div class="desc">'+r.desc+'</div></div>';
  });
  document.getElementById('tab-relations').innerHTML=rh;
  switchTab('entity');
}

function switchTab(t){
  ['entity','relations'].forEach(function(tab){
    var el=document.getElementById('tab-'+tab);
    if(el)el.classList.toggle('active',tab===t);
    document.querySelectorAll('.tabs button').forEach(function(b){
      b.classList.toggle('active',b.textContent.trim()==={entity:'Сущность',relations:'Связи'}[t]);
    });
  });
}
