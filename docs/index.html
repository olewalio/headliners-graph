<script>
function showInfo(id){
  var info = {
    'Headliners': {p:'🎙 Подкасты, интервью, трейдинг, крипта',s:'YT 330K / TG 41.5K / VK 19.2K',m:'Trade Lab, реф. ссылки CoinW/HashHedge/UTEX'},
    'Nikita_Anufriev': {p:'👤 Основатель Хедлайнеров',s:'YT 330K',m:'Хедлайнеры, HashHedge'},
    'Kirill_Evans': {p:'📚 Обучение криптотрейдингу, обзоры',s:'Крупный крипто-блогер',m:'Binance партнёр'},
    'Roman_Tomera': {p:'🎙 Крипто-подкасты, интервью',s:'Крупный крипто-блогер',m:'Binance, Bybit, OKX партнёр'},
    'PRO_BLOCKCHAIN': {p:'📰 Новости, дайджесты, аналитика',s:'Крупный крипто-канал',m:'Bybit, BingX партнёр'},
    'SLEZY_SATOSHI': {p:'📊 Крипто-анализ, разборы',s:'Крупный крипто-канал',m:'Bitget партнёр'},
    'RDeni': {p:'📊 Крипто-аналитика, обзоры рынка',s:'Крупный аналитический канал',m:'WhiteBIT партнёр'},
    'SerCrypto': {p:'💹 Трейдинг, сигналы, обзоры',s:'Крупный сигнальный канал',m:'Bybit (ядро сети, 307 упоминаний)'},
    'Crypto_Falcon': {p:'💹 Трейдинг, сигналы',s:'Средний канал',m:'Bybit партнёр'},
    'Cryptology': {p:'📚 Обучение + 💹 сигналы',s:'Крупный канал',m:'OKX (ядро сети, 148 упоминаний)'},
    'Prometheus': {p:'📊 Аналитика, обзоры',s:'Средний канал',m:'Binance партнёр'},
    'Дневник_активов': {p:'📊 Управление активами, аналитика',s:'Средний канал',m:'Binance, Bybit партнёр'},
  };
  var el = document.getElementById('infoPanel');
  var titleEl = document.getElementById('infoTitle');
  if(info[id]) {
    titleEl.textContent = id.replace(/_/g,' ');
    document.getElementById('infoPositioning').textContent = info[id].p;
    document.getElementById('infoSubs').textContent = info[id].s;
    document.getElementById('infoMonetization').textContent = info[id].m;
    el.style.display = 'block';
  }
}
function closeInfo(){ document.getElementById('infoPanel').style.display = 'none'; }

// Add click handlers
document.addEventListener('DOMContentLoaded', function(){
  var nodes = document.querySelectorAll('[id^="node_"]');
  nodes.forEach(function(n){
    n.addEventListener('click', function(){
      var id = this.id.replace('node_','');
      showInfo(id);
    });
  });
  document.getElementById('infoClose').addEventListener('click', closeInfo);
});
</script>
